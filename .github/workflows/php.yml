name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    name: build

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4', '8.5']
        symfony-version: ['7.*', '8.*']
        exclude:
          # Symfony 8 requires PHP 8.4+
          - php-version: '8.2'
            symfony-version: '8.*'
          - php-version: '8.3'
            symfony-version: '8.*'

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP with PECL extension
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php-version }}-symfony-${{ matrix.symfony-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-version }}-symfony-${{ matrix.symfony-version }}-

    - name: Install dependencies
      run: |
        composer require --no-update symfony/serializer:${{ matrix.symfony-version }} symfony/property-access:${{ matrix.symfony-version }} symfony/http-client:${{ matrix.symfony-version }}
        composer install --prefer-dist --no-progress

    # Add a test script to composer.json, for instance: "test": "vendor/bin/phpunit"
    # Docs: https://getcomposer.org/doc/articles/scripts.md

    - name: Run test suite
      run: composer run-script test

    - name: PHPStan Static Analysis
      uses: php-actions/phpstan@v3
      with:
        configuration: phpstan.neon
        path: src/ test/
