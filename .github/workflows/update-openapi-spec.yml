name: Update OpenAPI Spec

on:
  schedule:
    # Run daily at 6:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-spec:
    name: Update OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install yq
        uses: mikefarah/yq@master

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Fetch and convert OpenAPI spec
        run: |
          curl -s https://developers.mattermost.com/mattermost-openapi-v4.yaml | yq -o=json > resources/openapi.json

      - name: Regenerate client
        run: php bin/api-generate

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          commit-message: 'feat: update Mattermost OpenAPI spec'
          title: 'feat: update Mattermost OpenAPI spec'
          body: |
            This PR was automatically generated by the daily OpenAPI spec update workflow.

            ## Changes

            - Updated `resources/openapi.json` with the latest Mattermost OpenAPI v4 spec
            - Regenerated client code from the updated spec

            Please review the changes before merging.
          branch: chore/update-openapi-spec
          delete-branch: true
          labels: |
            automated
            dependencies
